<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Atlas</title>
  
  <!-- CSS Layers -->
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/navigation.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/progress.css">

  <style>
    /* Prevent FOUC */
    body { opacity: 0; animation: fadeIn 0.3s ease-in forwards; }
    @keyframes fadeIn { to { opacity: 1; } }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <span class="brand-icon">🗺️</span>
        DevOps Atlas
      </div>
    </div>

    <nav class="nav-links">
      <a href="#/" class="active">
        <span class="nav-icon">🏠</span>
        Dashboard
      </a>
      <a href="#/roadmap">
        <span class="nav-icon">🗺️</span>
        Roadmap
      </a>
      <a href="#/labs">
        <span class="nav-icon">🔬</span>
        Lab Browser
      </a>
      <a href="#/projects">
        <span class="nav-icon">🏗️</span>
        Projects
      </a>
      <div class="nav-divider"></div>
      <a href="#/interview">
        <span class="nav-icon">🎤</span>
        Interview Prep
      </a>
      <a href="#/resources">
        <span class="nav-icon">📖</span>
        Resources
      </a>
    </nav>

    <!-- Sidebar Footer / Global Progress -->
    <div class="sidebar-footer">
      <div class="sidebar-progress-label">
        <span class="sidebar-progress-pct">0%</span>
        <span><span class="sidebar-done-count">0</span>/<span class="sidebar-total-count">0</span> labs</span>
      </div>
      <div class="sidebar-progress-bar">
        <div class="sidebar-progress-fill" style="width: 0%"></div>
      </div>
    </div>
  </aside>

  <!-- Main Content Wrapper -->
  <main class="main-content-wrapper">
    <!-- Top Navbar -->
    <header class="navbar">
      <div style="flex: 1;">
        <!-- Placeholder for mobile menu toggle or breadcrumbs -->
      </div>
      <div class="flex items-center gap-4">
        <button id="btn-theme-toggle" class="btn btn-icon btn-ghost" aria-label="Toggle Theme">
          ☀️
        </button>
      </div>
    </header>

    <!-- Dynamic Page Content -->
    <div id="main-content">
      <!-- Rendered by JS -->
    </div>
  </main>

  <!-- Application Entry Point -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
